<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>2048</title>
<style>
body{margin:0;background:#faf8ef;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column}
.header{display:flex;gap:20px;margin-bottom:20px;align-items:center}
.score-box{background:#bbada0;color:#fff;padding:10px 20px;border-radius:5px;font-weight:bold;min-width:80px;text-align:center}
.score-box .label{font-size:13px;opacity:0.8}
.score-box .value{font-size:25px}
#game{background:#bbada0;border-radius:6px;padding:15px;position:relative}
.grid{display:grid;grid-template-columns:repeat(4,100px);grid-gap:15px}
.cell{width:100px;height:100px;background:rgba(238,228,218,0.35);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:35px;font-weight:bold;transition:all 0.1s}
.cell[data-value="2"]{background:#eee4da;color:#776e65}
.cell[data-value="4"]{background:#ede0c8;color:#776e65}
.cell[data-value="8"]{background:#f2b179;color:#f9f6f2}
.cell[data-value="16"]{background:#f59563;color:#f9f6f2}
.cell[data-value="32"]{background:#f67c5f;color:#f9f6f2}
.cell[data-value="64"]{background:#f65e3b;color:#f9f6f2}
.cell[data-value="128"]{background:#edcf72;color:#f9f6f2;font-size:30px}
.cell[data-value="256"]{background:#edcc61;color:#f9f6f2;font-size:30px}
.cell[data-value="512"]{background:#edc850;color:#f9f6f2;font-size:30px}
.cell[data-value="1024"]{background:#edc53f;color:#f9f6f2;font-size:25px}
.cell[data-value="2048"]{background:#edc22e;color:#f9f6f2;font-size:25px}
.cell[data-value="4096"]{background:#3c3a32;color:#f9f6f2;font-size:25px}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(238,228,218,0.73);display:none;align-items:center;justify-content:center;flex-direction:column;border-radius:6px;z-index:10}
.overlay.show{display:flex}
.overlay-text{font-size:50px;font-weight:bold;color:#776e65;margin-bottom:20px}
.btn{background:#8f7a66;color:#f9f6f2;border:none;padding:12px 25px;font-size:16px;border-radius:5px;cursor:pointer;font-weight:bold;margin:5px}
.btn:hover{background:#9f8a76}
</style>
</head>
<body>
<h1 style="color:#776e65;margin:10px 0">2048</h1>
<div class="header">
<div class="score-box"><div class="label">SCORE</div><div class="value" id="score">0</div></div>
<div class="score-box"><div class="label">BEST</div><div class="value" id="best">0</div></div>
<button class="btn" onclick="init()">New Game</button>
</div>
<div id="game">
<div class="grid" id="grid"></div>
<div class="overlay" id="gameOver"><div class="overlay-text">Game Over!</div><button class="btn" onclick="init()">Try Again</button></div>
<div class="overlay" id="winOverlay"><div class="overlay-text">You Win!</div><button class="btn" onclick="continueGame()">Continue</button><button class="btn" onclick="init()">New Game</button></div>
</div>
<script>
let board=[],score=0,best=localStorage.getItem('2048-best')||0,won=false,gameOver=false;
document.getElementById('best').textContent=best;
function init(){board=Array(4).fill().map(()=>Array(4).fill(0));score=0;won=false;gameOver=false;document.getElementById('score').textContent=0;document.getElementById('gameOver').classList.remove('show');document.getElementById('winOverlay').classList.remove('show');addTile();addTile();render()}
function addTile(){let empty=[];for(let i=0;i<4;i++)for(let j=0;j<4;j++)if(!board[i][j])empty.push([i,j]);if(empty.length){let[r,c]=empty[Math.floor(Math.random()*empty.length)];board[r][c]=Math.random()<0.9?2:4}}
function render(){let html='';for(let i=0;i<4;i++)for(let j=0;j<4;j++){let v=board[i][j];html+=`<div class="cell" data-value="${v}">${v||''}</div>`}document.getElementById('grid').innerHTML=html}
function move(dir){if(gameOver)return;let moved=false,merged=Array(4).fill().map(()=>Array(4).fill(false));const slide=(r,c,dr,dc)=>{if(!board[r][c])return;let nr=r+dr,nc=c+dc;while(nr>=0&&nr<4&&nc>=0&&nc<4&&!board[nr][nc]){nr+=dr;nc+=dc}if(nr>=0&&nr<4&&nc>=0&&nc<4&&board[nr][nc]===board[r][c]&&!merged[nr][nc]){board[nr][nc]*=2;score+=board[nr][nc];board[r][c]=0;merged[nr][nc]=true;moved=true;if(board[nr][nc]===2048&&!won){won=true;setTimeout(()=>document.getElementById('winOverlay').classList.add('show'),300)}}else{nr-=dr;nc-=dc;if(nr!==r||nc!==c){board[nr][nc]=board[r][c];board[r][c]=0;moved=true}}};if(dir==='ArrowUp')for(let j=0;j<4;j++)for(let i=1;i<4;i++)slide(i,j,-1,0);if(dir==='ArrowDown')for(let j=0;j<4;j++)for(let i=2;i>=0;i--)slide(i,j,1,0);if(dir==='ArrowLeft')for(let i=0;i<4;i++)for(let j=1;j<4;j++)slide(i,j,0,-1);if(dir==='ArrowRight')for(let i=0;i<4;i++)for(let j=2;j>=0;j--)slide(i,j,0,1);if(moved){addTile();document.getElementById('score').textContent=score;if(score>best){best=score;document.getElementById('best').textContent=best;localStorage.setItem('2048-best',best)}render();if(checkGameOver()){gameOver=true;setTimeout(()=>document.getElementById('gameOver').classList.add('show'),300)}}}
function checkGameOver(){for(let i=0;i<4;i++)for(let j=0;j<4;j++){if(!board[i][j])return false;if(i<3&&board[i][j]===board[i+1][j])return false;if(j<3&&board[i][j]===board[i][j+1])return false}return true}
function continueGame(){document.getElementById('winOverlay').classList.remove('show')}
document.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();move(e.key)}});
init();
</script>
</body>
</html>
